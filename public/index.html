<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-commerce Website</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body class=" flex flex-col bg-gray-100 min-h-screen ">
  <header class="flex justify-between items-center p-4 bg-gray-900 text-white ">
    <h1 class="font-bold text-white text-3xl">MyStore 🛒</h1>
    <div class="flex items-center gap-[3rem] ml-auto">
      <input id="searchInput" type="text" placeholder="Search product"
        class="border rounded-lg px-5 py-1 focus:ring-2 focus:ring-blue-500 outline-none text-black">
      <button id="cartBtn" class="relative">
        <span class="text-white material-icons text-3xl">Shopping cart</span>
        <span id="cartCount"
          class="absolute bg-red-600 rounded-full -top-1 -right-5 text-xs px-2 py-1 text-white">0</span>
      </button>
      <button class=" bg-gray-200 rounded-full p-2">🌙</button>
    </div>
  </header>

  <!-- filter button -->
  <div class="p-4 flex gap-4 overflow-x-auto">
    <button class="filter-btn bg-blue-500 text-white px-3 py-1 rounded-full" data-category="all">All</button>
    <button class="filter-btn bg-gray-200 px-3 py-1 rounded-full" data-category="electronics">Electronics</button>
    <button class="filter-btn bg-gray-200 px-3 py-1 rounded-full" data-category="clothing">Clothing</button>
    <button class="filter-btn bg-gray-200 px-3 py-1 rounded-full" data-category="accessories">Accessories</button>
  </div>

  <!-- Product grid -->
  <main id="productGrid" class="grid grid-cols-4 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 p-6 "> </main>

  <!-- products -->
  <div id="productModel" class=" flex hidden  flex-col justify-center items-center fixed inset-0 bg-black/60">
    <div class="border rounded-lg shadow-lg max-w-md w-full p-6 relative animate-fadeIn">
      <button onclick="closeModal()"
        class=" text-2xl absolute top-3 right-3 text-gray-500 hover:text-red-500">✖</button>
      <img id="productImage" class="object-contain w-full h-48 bg-white">
      <div class="bg-blue-950 p-4">
        <h2 id="productTitle" class="text-2xl font-bold text-white"></h2>
        <p id="productCategory" class="text-gray-500"></p>
        <p id="productPrice" class="text-blue-500 font-bold text-[20px]"></p>
        <p id="productDetail" class="text-gray-500"></p> <button id="addToCartBtn"
          class="bg-blue-400 px-4 py-1 w-full mt-2 rounded-md text-white hover:bg-blue-600">Add to cart</button>
      </div>
    </div>
  </div>

  <!-- Cart Sidebar -->
  <aside id="cartSidebar"
    class="fixed right-0 top-0 h-full w-80 bg-gray-900 dark:text-white shadow-lg transform translate-x-full transition-transform duration-300 p-6 z-50 flex flex-col">
    <h2 class="text-xl font-bold mb-4">Your Cart</h2>
    <ul id="cartItems" class="flex-1 space-y-4 overflow-y-auto"></ul>
    <div class="mt-4 border-t pt-4">
      <p class="flex justify-between font-semibold">Total: <span id="cartTotal">$0</span></p>
      <button class="mt-3 w-full bg-green-500 hover:bg-green-600 text-white py-2 rounded-lg">Checkout</button>
    </div>
  </aside>
  <script src="script.js"></script>
</body>

</html>
